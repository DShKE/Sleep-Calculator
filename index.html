<!-- comments should be written like this in html
doctype html is necessary at the top of every html document for it to run in html5 -->
<!DOCTYPE html>
<!-- <html> serves as a container for all the elements in the document -->
<html>
<!-- <head> contains contains metadata and important setup information -->
<head>
    <meta charset="UTF-8">
    <title>Sleep Calculator</title>
    <!-- link keyword "links" and creates relationships between the document and external resources
    rel attribute in specifies the relationship between the current document and the linked resource so stylesheet means it will be a css for styling
    href attribute specifies the location of the resource youre linking to -->
    <link rel="stylesheet" href="styles.css">
</head>
<!-- body contains all the visible elements of the document -->

<body>
    <!-- div element is a generic container that groups other elements together
    div class corresponds to the css selectors (check styles document) -->
        <div class="calculatorwidget">
            <!-- h stands for header-->
            <h1>Lifetime Sleep Calculator</h1>
            <!-- div class corresponds to the css selectors (check styles document) -->
            <div class="disclaimer"> Disclaimer: This app is made for testing purposes only</div>
            <!-- id is the unique identifier for this element -->
            <input type="text" id="birthdate" placeholder="Select your birthday" onfocus="(this.type='date')">
            <!-- br stands for break (in text). -->
            <br>
            <button onclick="calculateSleep()">Calculate Sleep Time</button>
            <!-- div class corresponds to the css selectors (check styles document) -->
            <div id="result"></div>
            <br>
        </div>
        <footer>
            background source:
            <a href="https://www.vecteezy.com/free-vector/abstract">Abstract Vectors by Vecteezy</a>
        </footer>
    <!-- things enclosed within <script> are parsed as js -->
    <script>
        async function calculateSleep() {
            /*getElementById gets an element from an object by its identifier. in this case it gets the element birthdate from the html document.
            .value gets the value of the element birthdate*/
            const birthdateInput = document.getElementById("birthdate").value
            if (!birthdateInput) {
                alert("Please select your birthdate")
                //return stops the execution of the function and returns the parameters. it is "undefined" by default
                return
            }

            //calls the calculatelifetime sleep from the namespace sleepcalculator in the window object which is exposed to the frontend through exposeinmainworld.
            //basically just calculates the lifetime sleep using calculate lifetimesleep with the argument birthdateinput which is generated by getting the birthdate from the input as seen above
            const result = window.sleepCalculator.calculateLifetimeSleep(birthdateInput)
            /* ` is called a template literal. It allows you to create multi-line strings and embed expressions.
            innerhtml is used to modify html content inside an element, so  here it modifies the element "result" of the html document.
            the two backticks treat everything enclosed as a embed and keeps the formatting the same.
            by setting the statement equal to it, innerhtml modifies the result element and embeds the things enclosed in the backticks there.
            getelementbyid gets an element by its unique identifier */
            if (result.future) {
                document.getElementById("result").innerHTML = `You will be born in ${result.timeUntil} day${result.timeUntil == 1 ? "" : "s"}.`
            }
            else {
                document.getElementById("result").innerHTML = `
                You have slept approximately:<br>
                ${result.years} years<br>
                (${result.days} days / ${result.totalHours} hours)
            `
            }
        }
    </script>
</body>
</html>
